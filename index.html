<!doctype html><html lang="ru"><head>  <meta charset="utf-8">  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">  <meta name="viewport" content="width=device-width,initial-scale=1">  <title>Tverst80 &mdash; Links</title>  <style>    :root{      --bg:#07070a;      --panel:#0f1114;      --fg:#e6eef8;      --tg:#0088cc;      --yt:#ff0000;    }    *{box-sizing:border-box}    body{      margin:0;      min-height:100vh;      display:flex;      align-items:center;      justify-content:center;      background:        radial-gradient(circle at 10% 10%, #071226 0%, var(--bg) 40%),        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2));      color:var(--fg);      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;      padding:24px;    }    .card{      width:100%;      max-width:540px;      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));      border-radius:16px;      padding:34px;      box-shadow:0 10px 40px rgba(0,0,0,0.6);      text-align:center;    }    h1{      margin:0 0 10px;      font-size:28px;      letter-spacing:0.4px;    }    .subtitle{      margin:0 0 22px;      color:rgba(230,238,248,0.85);      opacity:0.9;      font-size:15px;    }    .links{display:flex;flex-direction:column;gap:12px;align-items:center}    a.btn{      display:flex;      align-items:center;      gap:12px;      width:100%;      max-width:420px;      padding:12px 16px;      border-radius:12px;      text-decoration:none;      color:#fff;      font-weight:700;      box-shadow:0 6px 20px rgba(0,0,0,0.6);      transition:transform .18s ease, box-shadow .18s ease;    }    a.btn .icon{      width:36px;      height:36px;      border-radius:8px;      display:inline-grid;      place-items:center;      font-size:16px;      flex:0 0 36px;      background:rgba(0,0,0,0.08);      backdrop-filter: blur(2px);    }    /* Teleg

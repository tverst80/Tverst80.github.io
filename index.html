<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tverst80 — Links</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        font-family: Arial, sans-serif;
        background: #000;
    }

    .side {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: flex 0.5s ease, filter 0.5s ease;
        position: relative;
        overflow: hidden;
    }

    .left {
        background: linear-gradient(to bottom right, rgba(0,0,255,0.3), rgba(0,0,255,0.1));
    }

    .right {
        background: linear-gradient(to bottom left, rgba(255,0,0,0.3), rgba(255,0,0,0.1));
    }

    .side img {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        margin-bottom: 20px;
        box-shadow: 0 0 25px rgba(0,0,0,0.8);
        transition: box-shadow 0.5s ease;
    }

    .links a {
        display: block;
        padding: 15px 30px;
        margin: 10px;
        border-radius: 10px;
        text-decoration: none;
        color: white;
        font-size: 1.2em;
        text-align: center;
        transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
    }

    /* Цвета кнопок */
    .youtube { background: #ff0000; }
    .youtube:hover { background: #cc0000; box-shadow: 0 0 15px #ff0000; }

    .telegram { background: #0088cc; }
    .telegram:hover { background: #006699; box-shadow: 0 0 15px #00aaff; }

    /* Эффекты при наведении */
    .left:hover {
        flex: 1.2;
        filter: brightness(1.3);
        box-shadow: inset 0 0 80px rgba(0,0,255,1);
    }

    .right:hover {
        flex: 1.2;
        filter: brightness(1.3);
        box-shadow: inset 0 0 80px rgba(255,0,0,1);
    }

    /* Глобальное свечение по краям */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        box-shadow: 0 0 60px rgba(255,0,0,0.5), 0 0 60px rgba(0,0,255,0.5) inset;
        z-index: 9999;
    }

    /* 📱 Адаптация для телефонов */
    @media (max-width: 768px) {
        body {
            flex-direction: column;
        }

        .side {
            width: 100%;
            height: 50vh;
        }

        .side:hover {
            flex: 1;
        }
    }
</style>
</head>
<body>
    <div class="side left">
        <img src="https://raw.githubusercontent.com/tverst80/Tverst80.github.io/refs/heads/main/Tverst80.jpg" alt="Моя аватарка">
        <div class="links">
            <a class="youtube" href="https://youtube.com/@Tverst80">YouTube</a>
            <a class="telegram" href="https://t.me/Tverst80">Telegram</a>
        </div>
    </div>

    <div class="side right">
        <img src="https://raw.githubusercontent.com/tverst80/Tverst80.github.io/refs/heads/main/Tverst50.png" alt="Аватарка друга">
        <div class="links">
            <a class="youtube" href="https://youtube.com/@Tverst50">YouTube</a>
            <a class="telegram" href="https://t.me/Tverst50">Telegram</a>
        </div>
    </div>
</body>
</html>
